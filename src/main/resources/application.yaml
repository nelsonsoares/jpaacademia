spring:
  application:
    name: jpaacademia
  datasource:
    url: jdbc:postgresql://localhost:5432/jpaacademia
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    date-format: dd/MM/yyyy
    time-zone: America/Sao_Paulo

logging:
  level:
    org:
      hibernate:
        type: trace