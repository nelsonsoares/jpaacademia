<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Academia API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 12px;
            background-color: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 {
            color: #61dafb;
        }

        p {
            color: #b3b3b3;
        }

        .status {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            border-radius: 20px;
            background-color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Conexão Estabelecida! 🚀</h1>
    <p>Aplicação JPA Academia está rodando! ✅</p>
    <div class="status">Status: On</div>
</div>
</body>
</html>
